name: post-publish-smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: post-publish-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tarball-smoke:
    name: tarball-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Setup Node (for npm pack + npx fallback)
        uses: actions/setup-node@v5
        with:
          node-version: 20.x

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: just install

      - name: Run post-publish smoke
        run: just test-post-publish

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: post-publish-smoke-logs
          path: |
            /tmp/post-publish-*/tsc.log
            /tmp/post-publish-*/proj/codegen.config.yaml
          retention-days: 14
          if-no-files-found: ignore
