# Golden frontend fixture — FK consumer of the explicit-plural `person`.
# `user belongs_to person` must resolve the target name from the registry:
# the resolver/lookup/store wiring references `persons` (person.plural), proving
# no plural is ever derived from the string "person" at emit time.
entity:
  name: user
  plural: users
  table: users
  folder_structure: nested
  sync: api

fields:
  tenant_id:
    type: uuid
    required: true
    index: true
    foreign_key: tenants.id

  email:
    type: string
    required: true
    max_length: 255
    unique: true
    index: true

  person_id:
    type: uuid
    required: true
    index: true
    foreign_key: persons.id

relationships:
  person:
    type: belongs_to
    target: person
    foreign_key: person_id
