# Opportunity Entity Definition
# A finite sales motion with a beginning and an end

entity:
  name: opportunity
  plural: opportunities
  table: opportunities
  folder_structure: nested
  scopeable: true

fields:
  tenant_id:
    type: uuid
    required: true
    index: true
    foreign_key: tenants.id

  name:
    type: string
    required: true
    max_length: 255

  # Core relationships (current snapshot)
  organization_id:
    type: uuid
    required: true
    index: true
    foreign_key: organizations.id

  owner_id:
    type: uuid
    required: true
    index: true
    foreign_key: users.id

  state_id:
    type: uuid
    required: true
    index: true
    foreign_key: deal_states.id

  # Core financials
  amount:
    type: decimal
    nullable: true

  currency:
    type: string
    nullable: true
    max_length: 3
    default: "USD"

  # Core timeline
  expected_close_date:
    type: date
    nullable: true

  closed_at:
    type: datetime
    nullable: true

relationships:
  organization:
    type: belongs_to
    target: organization
    foreign_key: organization_id

  owner:
    type: belongs_to
    target: user
    foreign_key: owner_id

  state:
    type: belongs_to
    target: deal_state
    foreign_key: state_id

# Config-driven change-source detection (#226-6, ADR-033).
# Schema-validated by the canonical DetectionConfigSchema from
# runtime/subsystems/sync. No codegen emission yet — that lands in #226-7.
detection:
  mode: poll
  poll:
    cursor:
      kind: systemModstamp
      field: SystemModstamp
  mapping:
    - source: Name
      target: name
    - source: Amount
      target: amount
      transform: decimal-string
    - source: CloseDate
      target: expected_close_date
      transform: date-iso
    - source: OwnerId
      target: owner_id
  filters:
    - field: IsDeleted
      op: eq
      value: false
    - field: StageName
      op: neq
      value: "Closed Lost"
