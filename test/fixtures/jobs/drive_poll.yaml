# Poll case — RFC-0005 §3. Dual triggers: one scheduled (cadence mirror) + one
# webhook doorbell (no cadence). Single poll arm; cursor advances.
type: drive_poll
pool: integration
triggers:
  - event: document_poll_due
    cadence: { every: 15m, align: true }
  - event: document_sync_due
arms:
  - kind: poll
    domain: document
    read:
      mode: poll
      poll:
        cursor: { kind: systemModstamp, field: SystemModstamp }
      mapping:
        - { source: id, target: external_id }
      filters: []
