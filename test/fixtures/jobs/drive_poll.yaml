# Poll case — RFC-0005 §3. Dual triggers: one schedule arm (job-owned cadence,
# emitter generates the scheduled event) + one event arm (a webhook doorbell).
# Single poll arm; cursor advances.
type: drive_poll
pool: integration
triggers:
  - schedule: { every: 15m, align: true }
  - event: document_sync_due
arms:
  - kind: poll
    domain: document
    read:
      mode: poll
      poll:
        cursor: { kind: systemModstamp, field: SystemModstamp }
      mapping:
        - { source: id, target: external_id }
      filters: []
