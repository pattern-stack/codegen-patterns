# Snapshot fixture (RFC-0001 §7). A multi-surface interaction provider — one
# Google OAuth feeds calendar + mail + transcript (ADR-0006: surfaces span
# contexts). Exercises the interaction surface registration (#418): these
# surfaces now emit adapters instead of being skipped.
slug: google
display_name: Google
auth:
  type: oauth2
  strategy: '@app/integrations/providers/google/google-oauth.strategy#GoogleOAuthStrategy'
  scopes:
    - https://www.googleapis.com/auth/calendar.readonly
    - https://www.googleapis.com/auth/gmail.readonly
client:
  class: '@app/integrations/providers/google/google.client#GoogleClient'
  base_url: https://www.googleapis.com
surfaces: [calendar, mail, transcript]
